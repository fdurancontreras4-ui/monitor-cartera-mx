<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Cartera — México</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --color-background-primary:#ffffff;--color-background-secondary:#eef1f5;--color-background-tertiary:#f5f7fa;
  --color-text-primary:#21262b;--color-text-secondary:#646464;
  --color-border-tertiary:rgba(20,32,48,0.10);--color-border-secondary:rgba(20,32,48,0.20);--color-border-primary:rgba(20,32,48,0.32);
  --border-radius-md:8px;--border-radius-lg:12px;--font-sans:system-ui,-apple-system,sans-serif;
  --accent:#00AFF2;--accent-soft:#e1f5fd;--accent-text:#005e86;--accent-strong:#006fa8;
  --gv-yellow:#FFBB00;--gv-blue:#00AFF2;--gv-gray:#646464;
}
@media (prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1c2226;--color-background-secondary:#262d32;--color-background-tertiary:#161a1d;
    --color-text-primary:#e9edf0;--color-text-secondary:#9aa0a6;
    --color-border-tertiary:rgba(255,255,255,0.09);--color-border-secondary:rgba(255,255,255,0.18);--color-border-primary:rgba(255,255,255,0.30);
    --accent:#00AFF2;--accent-soft:#06344a;--accent-text:#7fd4f7;--accent-strong:#0086c9;
  }
  .b-red{background:#501313!important;color:#F7C1C1!important;}
  .b-amber{background:#412402!important;color:#FAC775!important;}
  .b-green{background:#173404!important;color:#C0DD97!important;}
  .b-blue{background:#042C53!important;color:#B5D4F4!important;}
  .b-gray{background:#2C2C2A!important;color:#D3D1C7!important;}
  .b-purple{background:#26215C!important;color:#CECBF6!important;}
  .b-teal{background:#06344a!important;color:#7fd4f7!important;}
  .rec-box{background:#06344a!important;border-color:#00AFF2!important;}
  .rec-box .rec-title{color:#9fdcf7!important;}.rec-box .rec-body{color:#76c8ee!important;}
  .note-box,.dropzone{background:#262d32!important;}
}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary);min-height:100vh;}
.page{max-width:980px;margin:0 auto;padding:2rem 1.5rem 4rem;}
.head{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:1rem;}
h1{font-size:20px;font-weight:500;margin-bottom:.25rem;}
.subtitle{font-size:13px;color:var(--color-text-secondary);}
.nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem;}
.nav button{font-size:13px;padding:6px 14px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);}
.nav button.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500;border-color:var(--color-border-primary);}
.section{display:none;}.section.active{display:block;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem;}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;}
.metric .label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;}
.metric .value{font-size:22px;font-weight:500;}
.metric .sub{font-size:12px;color:var(--color-text-secondary);margin-top:2px;}
.card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;}
.card h3{font-size:14px;font-weight:500;color:var(--color-text-secondary);margin-bottom:1rem;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-label{font-size:12px;color:var(--color-text-secondary);min-width:180px;max-width:180px;line-height:1.3;}
.bar-track{flex:1;height:20px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.bar-num{font-size:12px;font-weight:500;color:var(--color-text-secondary);white-space:nowrap;min-width:70px;text-align:right;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-align:left;padding:6px 8px;border-bottom:.5px solid var(--color-border-tertiary);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;cursor:pointer;user-select:none;}
th.nosort{cursor:default;}
td{padding:8px;border-bottom:.5px solid var(--color-border-tertiary);vertical-align:middle;}
tbody tr{cursor:pointer;}
tbody tr:hover{background:var(--color-background-secondary);}
tr:last-child td{border-bottom:none;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;white-space:nowrap;}
.b-red{background:#FCEBEB;color:#A32D2D;}.b-amber{background:#FAEEDA;color:#854F0B;}.b-green{background:#EAF3DE;color:#3B6D11;}
.b-blue{background:#E6F1FB;color:#185FA5;}.b-gray{background:#EEF1F0;color:#566461;}.b-purple{background:#EEEDFE;color:#3C3489;}
.b-teal{background:var(--accent-soft);color:var(--accent-text);}
.rec-box{border-left:3px solid var(--accent);padding:10px 14px;margin-bottom:10px;background:var(--accent-soft);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;}
.rec-box .rec-title{font-size:13px;font-weight:500;color:var(--accent-text);margin-bottom:3px;}
.rec-box .rec-body{font-size:13px;color:var(--accent-text);line-height:1.5;opacity:.92;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media (max-width:680px){.grid2{grid-template-columns:1fr;}.bar-label{min-width:120px;max-width:120px;}}
.note-box{font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:1rem;line-height:1.55;}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;align-items:center;}
.controls input[type=text],.controls select,.urlrow input{font-family:var(--font-sans);font-size:13px;padding:7px 10px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);}
.controls input[type=text]{flex:1;min-width:160px;}
.btn{font-family:var(--font-sans);font-size:13px;font-weight:500;padding:7px 14px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-primary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;}
.btn-primary{background:var(--accent-strong);color:#fff;border-color:var(--accent-strong);}
.btn:disabled{opacity:.55;cursor:default;}
.spark{display:inline-flex;align-items:flex-end;gap:2px;height:22px;}
.spark span{width:6px;background:var(--accent);border-radius:1px;display:block;opacity:.85;}
.chip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;background:var(--color-background-secondary);color:var(--color-text-secondary);margin:0 4px 4px 0;}
.pr-card{display:flex;align-items:center;gap:12px;padding:11px 12px;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:8px;cursor:pointer;background:var(--color-background-primary);}
.pr-card:hover{background:var(--color-background-secondary);}
.pr-card.gap{border-left:3px solid #E24B4A;}
.pr-rank{font-size:15px;font-weight:600;color:var(--color-text-secondary);min-width:26px;text-align:center;}
.pr-main{flex:1;min-width:0;}
.pr-name{font-size:14px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pr-meta{font-size:11px;color:var(--color-text-secondary);}
.pr-score{font-size:20px;font-weight:600;min-width:42px;text-align:right;}
.callout{border-left:3px solid #E24B4A;background:#FCEBEB;color:#7a2222;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:12px 14px;margin-bottom:1rem;font-size:13px;line-height:1.55;}
@media (prefers-color-scheme:dark){.callout{background:#501313;color:#F7C1C1;}}
.callout strong{font-weight:600;}
.callout button{margin-top:8px;font-size:12px;padding:5px 12px;border-radius:6px;border:.5px solid currentColor;background:transparent;color:inherit;cursor:pointer;font-weight:500;}
.dropzone{border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:22px;text-align:center;color:var(--color-text-secondary);font-size:13px;background:var(--color-background-secondary);cursor:pointer;transition:border-color .15s;}
.dropzone.drag{border-color:var(--accent);color:var(--accent);}
.urlrow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}.urlrow input{flex:1;min-width:180px;}
.legend{font-size:11px;color:var(--color-text-secondary);line-height:1.6;}
.steps{font-size:12.5px;color:var(--color-text-secondary);line-height:1.7;padding-left:1.1rem;}
.steps li{margin-bottom:3px;}.steps code{background:var(--color-background-secondary);padding:1px 5px;border-radius:4px;font-size:11.5px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;padding:24px 16px;z-index:50;overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:var(--color-background-tertiary);border-radius:var(--border-radius-lg);max-width:780px;width:100%;padding:1.25rem 1.4rem 1.6rem;box-shadow:0 18px 50px rgba(0,0,0,.3);}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:.25rem;}
.modal-head h2{font-size:18px;font-weight:600;line-height:1.25;}
.close-x{background:none;border:none;font-size:24px;line-height:1;color:var(--color-text-secondary);cursor:pointer;padding:0 4px;}
.dl-grid{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:13px;}
.dl-grid dt{color:var(--color-text-secondary);white-space:nowrap;}
.dl-grid dd{color:var(--color-text-primary);}
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
@media (max-width:560px){.mod-grid{grid-template-columns:1fr;}}
.mod-item{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:12px;padding:5px 9px;border-radius:6px;background:var(--color-background-secondary);}
.mod-item .raw{font-size:10px;color:var(--color-text-secondary);}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-secondary);margin:14px 0 8px;}
.big-bars{display:flex;align-items:flex-end;gap:10px;height:90px;padding-top:6px;}
.big-bars .bb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
.big-bars .bb .bar{width:100%;max-width:46px;background:var(--accent);border-radius:3px 3px 0 0;opacity:.9;}
.big-bars .bb .lbl{font-size:10px;color:var(--color-text-secondary);margin-top:4px;}
.big-bars .bb .amt{font-size:10px;color:var(--color-text-secondary);margin-bottom:3px;}
.status-line{font-size:12px;color:var(--color-text-secondary);margin-top:8px;line-height:1.5;}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle;}
/* ---- Marca GeoVictoria ---- */
.brandbar{border-bottom:3px solid var(--gv-yellow);padding-bottom:14px;margin-bottom:1rem;}
.brand{display:flex;align-items:center;gap:14px;}
.brand img{height:34px;width:auto;display:block;flex:none;}
.brand .titles{min-width:0;}
.head{align-items:center;}
/* ---- Prioridad por KAM ---- */
.kam-group{margin-bottom:1.1rem;}
details.kam-group>summary{list-style:none;cursor:pointer;}
details.kam-group>summary::-webkit-details-marker{display:none;}
.kam-head .chev{display:inline-block;transition:transform .15s;color:var(--color-text-secondary);font-size:11px;flex:none;}
details.kam-group[open]>summary .chev{transform:rotate(90deg);}
.kam-body{padding-top:2px;}
.pr-accion{font-size:11.5px;color:var(--color-text-secondary);line-height:1.45;margin-top:8px;padding-top:7px;border-top:.5px solid var(--color-border-tertiary);}
.hm-wrap{overflow:auto;max-height:72vh;}
table.hm{border-collapse:separate;border-spacing:0;}
table.hm th, table.hm td{padding:0;}
table.hm .hm-emp{position:sticky;left:0;background:var(--color-background-primary);text-align:left;font-size:11px;padding:3px 10px;white-space:nowrap;max-width:300px;overflow:hidden;text-overflow:ellipsis;border-bottom:0.5px solid var(--color-border-tertiary);z-index:1;}
table.hm thead th{position:sticky;top:0;background:var(--color-background-primary);z-index:2;border-bottom:0.5px solid var(--color-border-secondary);}
table.hm thead th.hm-emp.hm-corner{z-index:3;font-weight:600;}
.hm-date{height:66px;width:22px;min-width:22px;vertical-align:bottom;}
.hm-datelbl{transform:rotate(-50deg);transform-origin:left bottom;white-space:nowrap;font-size:10px;width:22px;position:relative;left:13px;bottom:2px;color:var(--color-text-secondary);}
.hm-x{cursor:pointer;color:#C0392B;opacity:.55;}
.hm-x:hover{opacity:1;}
.hm-cell{width:20px;min-width:20px;height:18px;text-align:center;font-size:10px;font-weight:700;color:#fff;border:1px solid var(--color-background-primary);}
.hm-empty{background:var(--color-background-secondary);}
.c-ok{background:#63BE7B;} .c-aten{background:#FFC83D;} .c-crit{background:#E24B4A;}
.kam-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-left:4px solid var(--gv-yellow);background:var(--color-background-secondary);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:9px 13px;margin-bottom:8px;}
.kam-head .kam-name{font-size:14px;font-weight:600;color:var(--color-text-primary);}
.kam-head .kam-stats{font-size:11.5px;color:var(--color-text-secondary);}
.kam-head .kam-stats strong{font-weight:600;}
.kam-sub{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-secondary);margin:6px 0 5px 2px;}
.health-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.health-label{font-size:12px;color:var(--color-text-secondary);min-width:96px;max-width:96px;}
.health-bar{flex:1;height:18px;border-radius:4px;overflow:hidden;display:flex;background:var(--color-background-secondary);}
.health-bar span{height:100%;display:block;}
.health-num{font-size:11px;color:var(--color-text-secondary);min-width:118px;text-align:right;white-space:nowrap;}
.metric.mclick{cursor:pointer;border:1px solid transparent;transition:border-color .12s,background .12s;}
.metric.mclick:hover{border-color:var(--color-border-secondary);}
.metric.msel{border-color:var(--gv-blue);background:var(--accent-soft);}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}
.stat3-it{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:9px 10px;text-align:center;}
.stat3-v{font-size:20px;font-weight:600;}
.stat3-l{font-size:10.5px;color:var(--color-text-secondary);margin-top:2px;line-height:1.25;}
</style>
</head>

function matchPattern(name,patron){

  const N=' '+acc(name).replace(/[^a-z0-9]+/g,' ').trim()+' ';

  const pTight=acc(patron).replace(/&/g,'').replace(/[^a-z0-9]+/g,' ').trim();
  const pSpaced=acc(patron).replace(/&/g,' ').replace(/[^a-z0-9]+/g,' ').trim();
  if(!pTight)return false;
  if(Nt.indexOf(' '+pTight+' ')>=0)return true;
  if(pSpaced&&N.indexOf(' '+pSpaced+' ')>=0)return true;

}

  const ws=wb.Sheets[wb.SheetNames[0]];const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
  let hdr=-1;for(let i=0;i<Math.min(8,aoa.length);i++){const r=aoa[i]||[];if(r.filter(c=>c!=null&&String(c).trim()!=='').length>=2&&r.some(c=>typeof c==='string')){hdr=i;break;}}
  if(hdr<0)throw new Error('No se detectó la fila de encabezados.');
  const headers=aoa[hdr].map(c=>c==null?'':String(c).trim());
  const find=re=>headers.findIndex(h=>re.test(h));
  const catCol=find(/categor/i);
  const structured=catCol>=0&&(find(/adopci/i)>=0||find(/score/i)>=0||find(/nombre/i)>=0);
  if(structured){
    const c={id:find(/id\s*empresa|^id$/i),nombre:find(/nombre/i),cat:catCol,ad:find(/adopci/i),vari:find(/variaci/i),nps:find(/^nps$|\bnps\b/i),inc30:find(/incidencias?\s*30/i),score:find(/score/i),css:find(/^css$|customer success/i),seg:find(/segmento|segment|^seg$|tama[ñn]o/i)};
    if(c.nombre<0)c.nombre=find(RE_KEY);
    const rows=[];
    for(let r=hdr+1;r<aoa.length;r++){const row=aoa[r]||[];const key=txt(row[c.nombre]);if(!key)continue;
      const cat=txt(row[c.cat]);
      rows.push({key,keyNorm:normName(key),id:cleanId(c.id>=0?row[c.id]:null),flag:catFlag(cat),cat,
        ad:c.ad>=0?num(row[c.ad]):null,vari:c.vari>=0?num(row[c.vari]):null,nps:c.nps>=0?num(row[c.nps]):null,
        inc30:c.inc30>=0?num(row[c.inc30]):null,score:c.score>=0?num(row[c.score]):null,css:c.css>=0?txt(row[c.css]):null,seg:c.seg>=0?txt(row[c.seg]):null,raw:null});}
    return{headers,keyHeader:headers[c.nombre],signalHeaders:['Categoría','% Adopción','NPS','Incidencias','Score'],rows,structured:true};
  }
  // genérico
  let keyCol=find(RE_KEY);
  if(keyCol<0){let best=-1,bestN=-1;headers.forEach((h,col)=>{const set=new Set();for(let r=hdr+1;r<aoa.length;r++){const v=(aoa[r]||[])[col];if(typeof v==='string'&&v.trim())set.add(v.trim());}if(set.size>bestN){bestN=set.size;best=col;}});keyCol=best;}
  const signalCols=headers.map((h,i)=>RE_SIGNAL.test(h)?i:-1).filter(i=>i>=0&&i!==keyCol);
  const rows=[];
  for(let r=hdr+1;r<aoa.length;r++){const row=aoa[r]||[];const key=txt(row[keyCol]);if(!key)continue;const obj={};headers.forEach((h,i)=>{if(h&&row[i]!=null&&String(row[i]).trim()!=='')obj[h]=row[i];});const sigVals=signalCols.map(col=>row[col]).filter(v=>v!=null&&String(v).trim()!=='');rows.push({key,keyNorm:normName(key),flag:classifyFlag(sigVals.length?sigVals:[key]),raw:obj});}
  return{headers,keyHeader:headers[keyCol],signalHeaders:signalCols.map(i=>headers[i]),rows};
}
function seedToParsed(seed){
  return{keyHeader:'Nombre Empresa',signalHeaders:['Categoría','% Adopción','NPS','Incidencias','Score'],structured:true,
    rows:seed.map(r=>({key:r.nombre,keyNorm:normName(r.nombre),id:cleanId(r.id),flag:catFlag(r.cat),cat:r.cat,ad:r.ad,vari:r.var,nps:r.nps,inc30:r.inc30,score:r.score,css:r.css,seg:r.seg,raw:null}))};

function applyHealth(parsed){
  const byNorm={},byId={};parsed.rows.forEach(r=>{nameKeys(r.key).forEach(k=>{(byNorm[k]=byNorm[k]||[]).push(r);});if(r.id)byId[r.id]=r;});
  let matched=0;const used=new Set();ACCOUNTS.forEach(a=>{a.health=null;});
  ACCOUNTS.forEach(a=>{
    let hit=null;const pid=cleanId(a.id);
    if(pid&&byId[pid])hit=byId[pid];
    if(!hit){const keys=nameKeys(a.cliente);
      for(const n of keys){if(byNorm[n]){hit=byNorm[n][0];break;}}
      if(!hit){for(const n of keys){const key=Object.keys(byNorm).find(k=>k.length>4&&(k.includes(n)||n.includes(k)));if(key){hit=byNorm[key][0];break;}}}
    }
    if(hit){a.health={flag:hit.flag,categoria:hit.cat,adopcion:hit.ad,variacion:hit.vari,nps:hit.nps,inc30:hit.inc30,score:hit.score,css:hit.css,seg:hit.seg,raw:hit.raw};matched++;used.add(hit.keyNorm||hit.id);}
  });
  const unmatched=parsed.rows.filter(r=>!used.has(r.keyNorm)&&!used.has(r.id)).map(r=>({key:r.key,flag:r.flag,cat:r.cat||null,ad:r.ad,nps:r.nps,inc30:r.inc30,score:r.score,css:r.css,seg:r.seg,id:r.id}));
  HEALTH={loaded:true,matched,total:parsed.rows.length,unmatched,keyHeader:parsed.keyHeader,signalHeaders:parsed.signalHeaders};

}

// ---------- prioridad ----------
function priority(a){
  let s=0;const drivers=[];
  if(a.mrr){s+=Math.min(a.mrr/2000,1)*WEIGHTS.mrr;if(a.mrr>=800)drivers.push(['MRR alto','b-blue']);}
  if(!a._cambioRazon&&a.fuga==='Baja'){s+=WEIGHTS.fugaBaja;drivers.push(['Fuga: baja','b-red']);}
  else if(!a._cambioRazon&&a.fuga==='Disminución'){s+=WEIGHTS.fugaDism;drivers.push(['Facturación a la baja','b-amber']);}
  if(!a._cambioRazon&&a.estadoSalud&&/[ií]tic/i.test(a.estadoSalud)){s+=WEIGHTS.saludCritico;drivers.push(['Salud crítica','b-red']);}
  if(a.health){if(a.health.flag==='critico'){s+=WEIGHTS.healthCritico;drivers.push(['Salud (semana): crítico','b-red']);}else if(a.health.flag==='atencion'){s+=WEIGHTS.healthAtencion;drivers.push(['Salud (semana): atención','b-amber']);}}
  const cu=(a.cuadrante||'').toLowerCase();
  if(cu.includes('retener')){s+=WEIGHTS.cuadRetener;drivers.push(['Retener','b-purple']);}
  else if(cu.includes('expandir')){s+=WEIGHTS.cuadExpandir;drivers.push(['Expandir','b-green']);}
  else if(cu.includes('alcanzar'))s+=WEIGHTS.cuadAlcanzar;else if(cu.includes('mantener'))s+=WEIGHTS.cuadMantener;
  if(a.opCount){s+=Math.min(a.opCount,3)*WEIGHTS.upside;if(a.opCount>0)drivers.push([a.opCount+' op. cross','b-green']);}
  if((isCritica(a)||isRiesgo(a))&&!hasCS(a)){s+=WEIGHTS.churnGap;drivers.push(['Sin CS · prevenir churn','b-red']);}
  a._score=Math.min(Math.round(s),100);a._drivers=drivers;return a._score;
}

function drawPrList(){

  const KAM_ORDER=['raul','dafne','karla','no asignado'];
  const kamRank=name=>{const n=normName(name);for(let i=0;i<KAM_ORDER.length;i++){if(n.includes(KAM_ORDER[i]))return i;}return KAM_ORDER.length;};
  const ordered=Object.entries(groups).map(([kam,arr])=>{

  }).sort((x,y)=> kamRank(x.kam)-kamRank(y.kam) || y.crit.length-x.crit.length || y.ries.length-x.ries.length || y.montoRiesgo-x.montoRiesgo || y.total-x.total);
  $('prTitle').textContent=`${rows.length} cuentas en ${ordered.length} KAM · críticas por marcaje ascendente`;
  if(!rows.length){$('prList').innerHTML='<p class="legend">No hay cuentas con estos filtros.</p>';return;}
  // marcaje ascendente: peor marcaje (menor adopción) primero; sin dato al final
  const marc=a=>(a.health&&a.health.adopcion!=null)?a.health.adopcion:Infinity;
  const byMarcaje=(a,b)=>marc(a)-marc(b) || (b._score-a._score);
  const byScore=(a,b)=>b._score-a._score;
  const tools=`<div style="display:flex;gap:8px;margin-bottom:10px"><button class="btn" style="font-size:12px;padding:5px 11px" onclick="prToggleAll(true)">Expandir todo</button><button class="btn" style="font-size:12px;padding:5px 11px" onclick="prToggleAll(false)">Colapsar todo</button></div>`;
  const groupsHtml=ordered.map(g=>{
    g.crit.sort(byMarcaje);g.ries.sort(byScore);g.resto.sort(byScore);
    const sinCSn=g.crit.concat(g.ries).filter(a=>!hasCS(a)).length;
    let rank=0;
    const block=(arr,label)=>arr.length?`<div class="kam-sub">${label} · ${arr.length}</div>${arr.map(a=>prCard(a,++rank)).join('')}`:'';
    return`<details class="kam-group">
      <summary class="kam-head">
        <span class="chev">▸</span>
        <span class="kam-name">${esc(g.kam)}</span>
        <span class="kam-stats"><strong style="color:#E24B4A">${g.crit.length}</strong> críticas · <strong style="color:#EF9F27">${g.ries.length}</strong> en riesgo${g.resto.length?` · <strong style="color:#3B6D11">${g.resto.length}</strong> saludables`:''} · <strong>${fmtUSD(g.montoRiesgo)}/mes</strong> expuesto${sinCSn?` · <strong style="color:#E24B4A">${sinCSn} sin CS</strong>`:''}</span>
      </summary>
      <div class="kam-body">${block(g.crit,'🔴 Críticas (marcaje ↑)')}${block(g.ries,'🟠 En riesgo')}${block(g.resto,'🟢 Saludables')}</div>
    </details>`;
  }).join('');
  // críticas del modelo de salud que no emparejan con ninguna cuenta de la cartera (sin KAM)
  let extra='';

  if(showCrit&&HEALTH.loaded&&HEALTH.unmatched.length){
    const testRe=/piloto|prueba|demo|test|geovictoria|checador|jealt/i;
    let uc=HEALTH.unmatched.filter(u=>u.flag==='critico'&&!testRe.test(u.key));
    if(prState.cs==='sin')uc=uc.filter(u=>!u.css);else if(prState.cs==='con')uc=uc.filter(u=>!!u.css);
    uc.sort((x,y)=>((x.ad==null?Infinity:x.ad)-(y.ad==null?Infinity:y.ad)));
    if(uc.length){let rank=0;
      extra=`<details class="kam-group">
        <summary class="kam-head" style="border-left-color:#A32D2D">
          <span class="chev">▸</span>
          <span class="kam-name">⚠ Sin emparejar en cartera</span>
          <span class="kam-stats"><strong style="color:#E24B4A">${uc.length}</strong> críticas del modelo de salud sin cuenta en la cartera (sin KAM)</span>
        </summary>
        <div class="kam-body"><div class="kam-sub">🔴 Críticas (marcaje ↑) · ${uc.length}</div>${uc.map(u=>prCardUnmatched(u,++rank)).join('')}</div>
      </details>`;}

}

function razonHealth(h){const ad=h.ad,nps=h.nps,ic=h.inc30,cat=h.cat;if((cat&&/sin\s*uso/i.test(cat))||ad===0)return'sinuso';if(ad!=null&&ad<0.60)return'marcaje';if(nps!=null&&nps<=6)return'nps';if(ic!=null&&ic>=1)return'ticket';return null;}

// ---------- Salud semanal (heatmap) ----------
let CURRENT_HEALTH_DATE='';
let CURRENT_HEALTH_FILE='';
let CURRENT_HEALTH_SOURCE='';
let FORCED_HEALTH_FILE='';
function todayISO(){return new Date().toISOString().slice(0,10);}
function detectDateFromName(name){
  if(!name)return null;
  const s=String(name).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  let m=s.match(/(20\d{2})[-_./]?(0[1-9]|1[0-2])[-_./]?(0[1-9]|[12]\d|3[01])/);
  if(m)return `${m[1]}-${m[2]}-${m[3]}`;
  const months={enero:1,ene:1,febrero:2,feb:2,marzo:3,mar:3,abril:4,abr:4,mayo:5,may:5,junio:6,jun:6,julio:7,jul:7,agosto:8,ago:8,septiembre:9,setiembre:9,sept:9,sep:9,octubre:10,oct:10,noviembre:11,nov:11,diciembre:12,dic:12};
  const mre='(enero|ene|febrero|feb|marzo|mar|abril|abr|mayo|may|junio|jun|julio|jul|agosto|ago|septiembre|setiembre|sept|sep|octubre|oct|noviembre|nov|diciembre|dic)';
  m=s.match(new RegExp('(\\d{1,2})\\s*(?:de\\s*)?[-_ ]?'+mre));
  if(!m)m=s.match(new RegExp(mre+'\\s*[-_ ]?(\\d{1,2})'));
  if(m){let day,mon;if(/^\d/.test(m[1])){day=+m[1];mon=months[m[2]];}else{mon=months[m[1]];day=+m[2];}
    if(mon&&day>=1&&day<=31){const yr=(s.match(/20\d{2}/)||[])[0]||String(new Date().getFullYear());return `${yr}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`;}}
  m=s.match(/(0?[1-9]|[12]\d|3[01])[-_./](0?[1-9]|1[0-2])(?:[-_./](20\d{2}))?/);
  if(m){const yr=m[3]||String(new Date().getFullYear());return `${yr}-${String(+m[2]).padStart(2,'0')}-${String(+m[1]).padStart(2,'0')}`;}
  return null;
}
function weekLetter(r){const cat=(r.cat||'').toLowerCase(),ad=r.ad,nps=r.nps,inc=r.inc30;
  if(/sin\s*uso/.test(cat)||ad===0)return'A';if(ad!=null&&ad<0.60)return'A';if(nps!=null&&nps<=6)return'N';if(inc!=null&&inc>=1)return'T';return'A';}
function snapshotFromHealth(parsed){
  const rows=((parsed||HEALTH_CACHE)||{}).rows||[];const testRe=/piloto|prueba|demo|test|geovictoria|checador|jealt/i;const snap={};
  rows.forEach(r=>{const nm=(r.key||'').trim();if(!nm||testRe.test(nm))return;const fl=r.flag;if(!fl)return;snap[nm]=fl==='ok'?'ok':fl==='atencion'?'aten':weekLetter(r);});
  return snap;
}
function saveWeekSnap(date,snap){if(!date||!snap||!Object.keys(snap).length)return false;const i=WEEKS.findIndex(w=>w.date===date);if(i>=0)WEEKS[i]={date,snap};else WEEKS.push({date,snap});WEEKS.sort((a,b)=>a.date<b.date?-1:1);if(WEEKS.length>40)WEEKS=WEEKS.slice(WEEKS.length-40);persist('health_weeks',WEEKS);return true;}
// aplica una salud fechada: siempre la guarda como semana; usa para métricas solo si es la más reciente
function applyHealthDated(parsed,date,file){

}
function saveWeek(date){if(!date)return;const snap=snapshotFromHealth();if(!Object.keys(snap).length){toast('No hay salud cargada para guardar.',true);return;}
  saveWeekSnap(date,snap);toast('Semana '+date+' guardada ✓');renderSemanal();}
function delWeek(date){if(!confirm('¿Borrar la semana '+date+' del historial?'))return;WEEKS=WEEKS.filter(w=>w.date!==date);persist('health_weeks',WEEKS);renderSemanal();}
function fmtWeek(d){try{const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('es-MX',{day:'2-digit',month:'short'});}catch(e){return d;}}
let semQ='';
function renderSemanal(){

  const head=weeks.map(w=>`<th class="hm-date"><div class="hm-datelbl">${fmtWeek(w.date)}${!transient?` <span class="hm-x" title="Borrar semana" onclick="delWeek('${w.date}')">✕</span>`:''}</div></th>`).join('');

function drawCuTable(){
  let rows=ACCOUNTS.filter(a=>{

    return true;});

  });
  html+='</tbody>';$('cuTable').innerHTML=html;
  $('cuCount').textContent=`${rows.length} cuentas mostradas de ${ACCOUNTS.length}.`;
  $('cuTable').querySelectorAll('th[data-sort]').forEach(t=>t.onclick=()=>{const k=t.dataset.sort;if(cuState.sort===k)cuState.dir*=-1;else{cuState.sort=k;cuState.dir=k==='mrr'?-1:1;}drawCuTable();});

// ---------- Por KAM ----------
const KAM_META={'Ra\u00fal Campos':1500,'Dafne de la Rosa':1300,'Karla Pati\u00f1o':900};
function gaugeHTML(pct,sub,color){const p=Math.max(0,Math.min(100,pct));const real=Math.max(0,Math.round(pct));const c=p>=100?'#639922':p>=70?(color||'#00AFF2'):p>=40?'#EF9F27':'#E24B4A';return `<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap"><div style="width:120px;height:120px;border-radius:50%;background:conic-gradient(${c} ${p*3.6}deg, var(--color-background-secondary) 0deg);display:flex;align-items:center;justify-content:center;flex:none"><div style="width:88px;height:88px;border-radius:50%;background:var(--color-background-primary);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:${c}">${real}%</div></div><div style="flex:1;min-width:200px;font-size:12px;color:var(--color-text-secondary);line-height:1.6">${sub}</div></div>`;}
function renderKamTab(kam,sectionId){
  const cross=VENTAS_DATA.filter(r=>r.categoria==='cross'&&r.kam===kam&&r.estado==='Facturado');
  const upsell=VENTAS_DATA.filter(r=>r.categoria==='upsell'&&r.kam===kam&&r.estado==='Facturado');
  const arriendo=VENTAS_DATA.filter(r=>r.categoria==='arriendo'&&r.kam===kam&&r.estado==='Facturado');
  const bajas=FUGA_DETALLE.filter(r=>r.tipo==='Baja'&&r.kam===kam);
  const referidos=ACCOUNTS.filter(a=>a.kam===kam&&a.referido);
  const sumUSD=rows=>rows.reduce((s,r)=>s+(r.usd||r.facturacionUSD||0),0);
  const mesesCM=monthSums(cross,'mes',r=>r.usd||0),mesesUM=monthSums(upsell,'mes',r=>r.usd||0),mesesAM=monthSums(arriendo,'mes',r=>r.usd||0),mesesBM=monthSums(bajas,'mesBaja',r=>r.facturacionUSD||0);
  const qC=qSum(cross,r=>r.usd||0),qU=qSum(upsell,r=>r.usd||0),qA=qSum(arriendo,r=>r.usd||0),qB=qSum(bajas,r=>r.facturacionUSD||0);
  const meta=KAM_META[kam]||0;const metaQ3=meta*3;
  const q3USD=sumUSD(cross.filter(r=>r.q==='Q3'))+sumUSD(upsell.filter(r=>r.q==='Q3'))+sumUSD(arriendo.filter(r=>r.q==='Q3'));
  const pct=metaQ3?(q3USD/metaQ3*100):0;
  const thMonths='<th class=\"nosort\">Ene</th><th class=\"nosort\">Feb</th><th class=\"nosort\">Mar</th><th class=\"nosort\">Abr</th><th class=\"nosort\">May</th><th class=\"nosort\">Jun</th><th class=\"nosort\">Jul</th><th class=\"nosort\">Ago</th>';
  const rowHTML=(label,vals)=>{const total=vals.reduce((a,b)=>a+b,0);return `<tr style="cursor:default"><td style="font-weight:500">`+label+`</td>`+vals.map(c=>`<td>`+fmtUSD(c)+`</td>`).join('')+`<td style="font-weight:600">`+fmtUSD(total)+`</td></tr>`;};
  const rowQHTML=(label,q)=>`<tr style="cursor:default"><td style="font-weight:500">`+label+`</td><td>`+fmtUSD(q.Q1)+`</td><td>`+fmtUSD(q.Q2)+`</td><td>`+fmtUSD(q.Q3)+`</td><td>`+fmtUSD(q.Q4)+`</td></tr>`;
  $(sectionId).innerHTML=`
  <div class="note-box">Cross-selling, upselling y arriendo vienen de la hoja <strong>Ventas 2026</strong> (solo Estado = Facturado; se excluyen Proyectados); fuga (solo Baja) de <strong>Detalle Fuga 2026</strong>; referidos, de la columna "Referido/Referencia" de la cartera MARE MX (dato disponible en pocas cuentas). Todos los montos en USD.</div>
  <div class="metrics">
    <div class="metric"><div class="label">Cross-selling YTD</div><div class="value">${fmtUSD(sumUSD(cross))}</div><div class="sub">${cross.length} deals</div></div>
    <div class="metric"><div class="label">Upselling YTD</div><div class="value">${fmtUSD(sumUSD(upsell))}</div><div class="sub">${upsell.length} deals</div></div>
    <div class="metric"><div class="label">Arriendo YTD</div><div class="value">${fmtUSD(sumUSD(arriendo))}</div><div class="sub">${arriendo.length} deals</div></div>
    <div class="metric"><div class="label">Referidos</div><div class="value">${referidos.length}</div><div class="sub">cuentas marcadas</div></div>
    <div class="metric"><div class="label">Bajas (fuga real) YTD</div><div class="value" style="color:#E24B4A">${fmtUSD(sumUSD(bajas))}</div><div class="sub">${bajas.length} cuentas perdidas</div></div>
  </div>
  <div class="card"><h3>Por mes (USD facturado)</h3><div class="table-wrap"><table><thead><tr><th>Concepto</th>${thMonths}<th class="nosort">Total</th></tr></thead><tbody>
  ${rowHTML('Cross-selling',mesesCM)}${rowHTML('Upselling',mesesUM)}${rowHTML('Arriendo',mesesAM)}${rowHTML('Bajas',mesesBM)}
  </tbody></table></div></div>
  <div class="card"><h3>Por Q (USD facturado)</h3><div class="table-wrap"><table><thead><tr><th>Concepto</th><th class="nosort">Q1</th><th class="nosort">Q2</th><th class="nosort">Q3</th><th class="nosort">Q4</th></tr></thead><tbody>
  ${rowQHTML('Cross-selling',qC)}${rowQHTML('Upselling',qU)}${rowQHTML('Arriendo',qA)}${rowQHTML('Bajas',qB)}
  </tbody></table></div></div>
  <div class="card"><h3>Avance a la meta · Q3 2026</h3>${gaugeHTML(pct,`<strong style="color:var(--color-text-primary)">Meta mensual de expansi\u00f3n (cross-sell + upsell + arriendo): ${fmtUSD(meta)}</strong>.<br>Meta Q3 (jul+ago+sep): <strong style="color:var(--color-text-primary)">${fmtUSD(metaQ3)}</strong>.<br>Llevas <strong style="color:var(--color-text-primary)">${fmtUSD(q3USD)}</strong> vendidos en Q3 (cross+upsell+arriendo).<br><span style="font-size:11px">Supuesto: la meta es mensual y se compara contra el trimestre completo (3x). Q3 reci\u00e9n empieza \u2014 el % subir\u00e1 con agosto y septiembre. Ajusta si tu meta considera solo cross-sell.</span>`)}</div>`;
}
function renderKamRaul(){renderKamTab('Ra\u00fal Campos','kam-raul');}
function renderKamDafne(){renderKamTab('Dafne de la Rosa','kam-dafne');}
function renderKamKarla(){renderKamTab('Karla Pati\u00f1o','kam-karla');}

let HEALTH_MANIFEST_LOG=[];
async function loadHealthManifest(url){
  HEALTH_MANIFEST_LOG=[];
  if(!url){HEALTH_MANIFEST_LOG.push({file:'(manifest)',status:'sin URL configurada'});return false;}
  try{
    const bust=(url.includes('?')?'&':'?')+'t='+Date.now();
    const resp=await fetch(url+bust,{cache:'no-store'});
    if(!resp.ok){HEALTH_MANIFEST_LOG.push({file:url,status:`manifest no encontrado (HTTP ${resp.status})`});return false;}
    const j=await resp.json();
    let files=Array.isArray(j)?j:(j.archivos||j.files||j.semanas||[]);
    const manifestPin=(!Array.isArray(j)&&(j.vigente||j.archivo_vigente||j.actual))||'';
    if(!files.length){HEALTH_MANIFEST_LOG.push({file:url,status:'manifest cargado pero sin archivos listados'});return false;}
    const base=url.replace(/[^/]*$/,'');
    const items=files.map(f=>({f,url:/^https?:|^\.?\//.test(f)?f:base+f,date:detectDateFromName(f)}));
    items.sort((a,b)=>((a.date||'')<(b.date||'')?-1:1)); // más antiguo primero, solo afecta el orden del historial
    const parsedOK=[]; // {file,date,parsed} — candidatos a "vigente"
    for(const it of items){
      const entry={file:it.f,url:it.url,dateDetectada:it.date};
      try{
        const b2=(it.url.includes('?')?'&':'?')+'t='+Date.now();
        const r2=await fetch(it.url+b2,{cache:'no-store'});
        if(!r2.ok){entry.status=`HTTP ${r2.status} (revisa mayúsculas/nombre exacto y que el archivo esté en el repo)`;HEALTH_MANIFEST_LOG.push(entry);continue;}
        const wb=XLSX.read(new Uint8Array(await r2.arrayBuffer()),{type:'array'});
        const parsed=parseHealthWorkbook(wb);
        if(!it.date)entry.status='cargado, pero no se detectó fecha en el nombre del archivo (revisa "ej. salud-mx-30junio.xlsx")';
        else entry.status='ok';
        saveWeekSnap(it.date||todayISO(),snapshotFromHealth(parsed));
        parsedOK.push({file:it.f,date:it.date,parsed});
      }catch(e){entry.status='error al leer/parsear: '+(e&&e.message||e);}
      HEALTH_MANIFEST_LOG.push(entry);
    }
    let chosen=null,pinSource='';
    if(FORCED_HEALTH_FILE){
      chosen=parsedOK.find(p=>p.file===FORCED_HEALTH_FILE)||null;
      pinSource='tu navegador (fijado localmente en Datos)';
      if(!chosen&&parsedOK.length){
        chosen=parsedOK.slice().sort((a,b)=>((a.date||'')<(b.date||'')?1:-1))[0];
        HEALTH_MANIFEST_LOG.push({file:FORCED_HEALTH_FILE,status:'⚠ este archivo fijado en tu navegador no está en el manifest de hoy (o no cargó); se usó como respaldo el más reciente disponible: '+(chosen?chosen.file:'ninguno')});
      }
    }else if(manifestPin){
      chosen=parsedOK.find(p=>p.file===manifestPin)||null;
      pinSource='el manifest del repo ("vigente" en salud_semanas.json) — aplica a todos los que abran el link';
      if(!chosen&&parsedOK.length){
        chosen=parsedOK.slice().sort((a,b)=>((a.date||'')<(b.date||'')?1:-1))[0];
        HEALTH_MANIFEST_LOG.push({file:manifestPin,status:'⚠ el archivo "vigente" del manifest no está en la lista de hoy (o no cargó); se usó como respaldo el más reciente disponible: '+(chosen?chosen.file:'ninguno')});
      }
    }else if(parsedOK.length){
      chosen=parsedOK.slice().sort((a,b)=>((a.date||'')<(b.date||'')?1:-1))[0];
      pinSource='automático (fecha más reciente en el nombre)';
    }
    if(chosen){
      applyHealth(chosen.parsed);
      CURRENT_HEALTH_DATE=chosen.date||todayISO();CURRENT_HEALTH_FILE=chosen.file;CURRENT_HEALTH_SOURCE=pinSource;
      persist('current_health_date',CURRENT_HEALTH_DATE);persist('current_health_file',CURRENT_HEALTH_FILE);
    }
    HEALTH_MANIFEST_LOG.forEach(e=>{e.vigente=(e.file===CURRENT_HEALTH_FILE);});
    if(chosen){LAST.healthUrl='';markReload();renderAll();renderSemanal();return true;}
    return false;
  }catch(e){HEALTH_MANIFEST_LOG.push({file:url,status:'error de red/CORS: '+(e&&e.message||e)});return false;}
}
async function autoLoad(){
  const url=CONFIG.portfolioUrl||LAST.portfolioUrl;
  if(url){await loadURL(url,{silent:true,probe:true});}
  else{for(const u of CONFIG.autoTryFiles){if(await loadURL(u,{silent:true,probe:true}))break;}}
  const man=await loadHealthManifest(CONFIG.healthManifest||'./salud_semanas.json');
  if(!man){const hurl=CONFIG.healthUrl||LAST.healthUrl;
    if(hurl){await loadHealthURL(hurl,{silent:true,probe:true});}
    else{await loadHealthURL('./salud.xlsx',{silent:true,probe:true});}}
  const curl=CONFIG.consideracionesUrl||LAST.consideracionesUrl||'./consideraciones.json';
  await loadConsideraciones(curl,{silent:true,probe:true});
}
async function init(){
  try{if(window.storage&&window.storage.get){
    const p=await window.storage.get('last_portfolio_url');if(p&&p.value)LAST.portfolioUrl=JSON.parse(p.value);
    const h=await window.storage.get('last_health_url');if(h&&h.value)LAST.healthUrl=JSON.parse(h.value);
    const hc=await window.storage.get('mare_health');if(hc&&hc.value){HEALTH_CACHE=JSON.parse(hc.value);applyHealth(HEALTH_CACHE);}
    const lr=await window.storage.get('last_reload');if(lr&&lr.value){const d=new Date(JSON.parse(lr.value));if(!isNaN(d))LAST_RELOAD=d;}
    const cu=await window.storage.get('last_consid_url');if(cu&&cu.value)LAST.consideracionesUrl=JSON.parse(cu.value);
  }}catch(e){}
  try{const wk=await readStore('health_weeks');if(Array.isArray(wk))WEEKS=wk;}catch(e){}
  try{const chd=await readStore('current_health_date');if(typeof chd==='string')CURRENT_HEALTH_DATE=chd;}catch(e){}
  try{const chf=await readStore('current_health_file');if(typeof chf==='string')CURRENT_HEALTH_FILE=chf;}catch(e){}
  try{const fhf=await readStore('forced_health_file');if(typeof fhf==='string')FORCED_HEALTH_FILE=fhf;}catch(e){}
  if(!HEALTH.loaded&&typeof HEALTH_SEED!=='undefined'&&HEALTH_SEED.length){try{applyHealth(seedToParsed(HEALTH_SEED));}catch(e){}}
  if(!LAST_RELOAD)markReload();
  renderAll();autoLoad();
}
ACCOUNTS=hydrate(SEED);
renderResumen();updateSubtitle();init();
</script>
